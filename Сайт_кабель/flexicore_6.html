<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>МОИ КЛИЕНТЫ | Премиальный промышленный кабель</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 850: '#1e293b', 900: '#0f172a' },
                        orange: { 500: '#ff6700', 600: '#e65c00', 700: '#cc5200' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        .hero-content {
            padding-bottom: 120px;
        }

        /* Blueprint grid */
        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body class="bg-white text-slate-800 font-sans antialiased">

    <!-- Навигация -->
    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-sm border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 bg-orange-500 flex items-center justify-center text-white font-bold text-2xl tracking-tighter">M</div>
                    <span class="font-bold text-2xl tracking-tighter text-slate-900">МОИ КЛИЕНТЫ</span>
                </div>

                <div class="hidden md:flex space-x-8 items-center">
                    <div class="flex space-x-6 mr-6">
                        <a href="#products" class="text-slate-600 hover:text-orange-500 font-medium transition-colors">Продукция</a>
                        <a href="#comparison" class="text-slate-600 hover:text-orange-500 font-medium transition-colors">Технологии</a>
                        <a href="#logistics" class="text-slate-600 hover:text-orange-500 font-medium transition-colors">Логистика</a>
                    </div>

                    <div class="flex items-center gap-2 font-mono text-sm mr-6">
                        <button id="btn-ru" class="text-orange-600 font-bold">RU</button>
                        <span class="text-slate-300">|</span>
                        <button id="btn-en" class="text-slate-400 hover:text-slate-600">EN</button>
                    </div>

                    <a href="#contact" class="bg-slate-900 text-white px-5 py-2.5 font-semibold text-sm hover:bg-orange-600 transition-colors uppercase tracking-wide">
                        Связаться
                    </a>
                </div>

                <div class="md:hidden flex items-center gap-4">
                    <button class="text-slate-600">
                        <i data-lucide="menu" class="w-8 h-8"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Главный экран -->
    <header class="relative pt-20 min-h-screen flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?auto=format&fit=crop&q=80&w=2000" alt="Industrial Background" class="w-full h-full object-cover">
            <div class="absolute inset-0 bg-slate-900/80"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-slate-900 via-transparent to-transparent"></div>
        </div>

        <!-- Blueprint grid -->
        <div class="grid-pattern"></div>

        <div class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full hero-content">
            <div class="max-w-4xl">
                <div class="inline-block border border-orange-500 text-orange-400 font-mono text-xs px-3 py-1 mb-6 bg-slate-900/50 uppercase tracking-widest">
                    Промышленный класс
                </div>
                <h1 class="font-extrabold text-white tracking-tight leading-none mb-8 uppercase" style="font-size: clamp(2.8rem, 6.5vw, 5.8rem);">
                    Немецкие<br>стандарты.<br>
                    <span class="text-orange-500">Русское сердце.</span>
                </h1>
                <p class="text-lg md:text-xl text-slate-300 mb-10 font-light leading-relaxed">
                    Премиальные кабели 1кВ с 5-м классом гибкости и <span class="text-white font-medium">100% первичной медью</span>.
                </p>
                <div class="flex flex-col sm:flex-row gap-4">
                    <button class="flex items-center justify-center bg-orange-600 text-white px-8 py-4 font-bold uppercase tracking-wider hover:bg-orange-500 transition-all shadow-xl">
                        <i data-lucide="download" class="w-5 h-5 mr-2"></i>
                        Скачать тех. каталог
                    </button>
                    <a href="#products" class="flex items-center justify-center px-8 py-4 border border-white/30 text-white hover:bg-white/10 transition-colors uppercase font-semibold text-sm tracking-wider">
                        Ассортимент
                    </a>
                </div>
            </div>
        </div>
        
        <!-- Статистика -->
        <div class="absolute bottom-0 w-full border-t border-white/10 bg-slate-900/60 backdrop-blur-md hidden md:block z-20">
            <div class="max-w-7xl mx-auto px-4 grid grid-cols-4 py-8">
                <div class="border-r border-white/10 px-4 text-center">
                    <p class="text-orange-500 font-mono text-2xl font-bold">100%</p>
                    <p class="text-slate-400 text-xs uppercase tracking-wide">Чистая медь</p>
                </div>
                <div class="border-r border-white/10 px-4 text-center">
                    <p class="text-orange-500 font-mono text-2xl font-bold">Class 5</p>
                    <p class="text-slate-400 text-xs uppercase tracking-wide">Гибкость</p>
                </div>
                <div class="border-r border-white/10 px-4 text-center">
                    <p class="text-orange-500 font-mono text-2xl font-bold">ISO</p>
                    <p class="text-slate-400 text-xs uppercase tracking-wide">Сертификация</p>
                </div>
                <div class="px-4 text-center">
                    <p class="text-orange-500 font-mono text-2xl font-bold">24h</p>
                    <p class="text-slate-400 text-xs uppercase tracking-wide">Логистика</p>
                </div>
            </div>
        </div>
    </header>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
